name: Release to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (leave empty to use pyproject.toml version)"
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run mypy

      - name: Run tests
        run: uv run pytest --tb=short

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Update version from release tag
        if: github.event_name == 'release'
        run: |
          # GITHUB_REF_NAME is the tag (e.g. "v0.13.0"); strip an optional 'v'.
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9] ]]; then
            echo "::error::Could not derive a version from tag '${GITHUB_REF_NAME}'. Tag the release like 'v0.13.0'."
            exit 1
          fi
          sed -i -E "s|^version = \".*\"|version = \"${VERSION}\"|" pyproject.toml
          echo "Building version: ${VERSION}"

      - name: Update version from input
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9] ]]; then
            echo "::error::Invalid version input '${VERSION}'. Expected something like '0.13.0'."
            exit 1
          fi
          sed -i -E "s|^version = \".*\"|version = \"${VERSION}\"|" pyproject.toml
          echo "Building version: ${VERSION}"

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
